name: Build Windows EXE

# Build the .exe when you push a version tag (e.g. v2.0.0), or on demand.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: write           # needed to upload the .exe to a Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: >
          pyinstaller --onefile --noconsole
          --name "AnimePaheDownloader"
          --collect-all patchright
          --collect-all webview
          --collect-all bs4
          animepahe_downloader.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnimePaheDownloader-windows
          path: dist/AnimePaheDownloader.exe

      - name: Attach EXE to the Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AnimePaheDownloader.exe
