name: Build Windows EXE

# Build the .exe when you push a version tag (e.g. v2.0.0), or on demand.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: write           # needed to upload the .exe to a Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Force x64 Python so pywebview loads the x64 WebView2 DLLs, not arm64.
      - name: Set up Python (x64)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pythonnet clr_loader

      # Locate pywebview's bundled WebView2 DLLs so we can add them explicitly;
      # the auto-hook sometimes misses them, which causes the win-arm64 error.
      - name: Build EXE
        shell: pwsh
        run: |
          $lib = python -c "import os, webview; print(os.path.join(os.path.dirname(webview.__file__), 'lib'))"
          Write-Host "webview lib dir: $lib"
          pyinstaller --onefile --noconsole `
            --name "AnimePaheDownloader" `
            --collect-all patchright `
            --collect-all webview `
            --collect-all bs4 `
            --hidden-import clr `
            --hidden-import clr_loader `
            --hidden-import pythonnet `
            --add-data "$lib;webview/lib" `
            animepahe_downloader.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnimePaheDownloader-windows
          path: dist/AnimePaheDownloader.exe

      - name: Attach EXE to the Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AnimePaheDownloader.exe
